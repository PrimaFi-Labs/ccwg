[package]
name = "ccwg"
version = "0.1.0"
edition = "2024_07"

[cairo]
sierra-replace-ids = true

[scripts]
sozo-test = "sozo test"

[dependencies]
dojo = "1.8"
pragma_lib = { git = "https://github.com/astraly-labs/pragma-lib" }
starknet = "2.14.1"
openzeppelin_utils = "=2.0.0"

[[target.starknet-contract]]
sierra = true
build-external-contracts = ["dojo::world::world_contract::world"]

[tool.scarb]
allow-prebuilt-plugins = ["dojo_cairo_macros"]

[dev-dependencies]
cairo_test = "2.14.1"
dojo_cairo_test = "1.8"

[features]
default = []

[profile.sepolia] 
inherits = "dev"
